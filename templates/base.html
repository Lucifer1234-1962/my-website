<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EngiPDF{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">⚙️ EngiPDF</div>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}"         class="{{ 'active' if request.endpoint == 'home' }}">🏠 Home</a></li>
            <li><a href="{{ url_for('upload_notes') }}" class="{{ 'active' if request.endpoint == 'upload_notes' }}">📤 Upload Note</a></li>
            <li><a href="{{ url_for('view_notes') }}"   class="{{ 'active' if request.endpoint == 'view_notes' }}">📚 View Notes</a></li>
            <li><a href="{{ url_for('add_quiz') }}"     class="{{ 'active' if request.endpoint == 'add_quiz' }}">➕ Add Quiz</a></li>
            <li><a href="{{ url_for('take_quiz') }}"    class="{{ 'active' if request.endpoint == 'take_quiz' }}">🧠 Take Quiz</a></li>
            <li><a href="{{ url_for('ai_quiz') }}"      class="{{ 'active' if request.endpoint == 'ai_quiz' }}">🤖 AI Quiz</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>🔧 Engineering Notes &amp; Quiz Sharing &nbsp;|&nbsp; Built with Flask</p>
    </footer>

</body>
</html>
